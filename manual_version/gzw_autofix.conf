# Required: filenames to watch (filenames only, no paths)
FILES=(
    "0xaf497c273f87b6e4_0x7a22fc105639587d.dat"
    "0xb9af63cee2e43b6c_0x3cb3b3354fb31606.dat"
)

# Optional
NOTIFY=false
